      <div class="full-width-form">
       <form action="/go/join-hbg" method="POST" type="multipart/form-data" class="pure-form pure-form-stacked pure-form-aligned">
        <p class="intro">
         <span class="meet-day">HBG meets every 2nd Monday</span>
         <span class="meet-frequency">of the month</span>
         <span class="meet-time">from 4:30-6pm.</span>
        </p>
        <div class="divider"></div>
        <label>Name / Given Name</label>
        <div class="divider"></div>
        <hr />
        <div class="divider"></div>
        <input placeholder="Ex: John Doe / Jane Doe" class="form-input" type="text" name="givenName" required="true" />
        <label>Phone Number</label>
        <div class="divider"></div>
        <hr />
        <div class="divider"></div>
        <input placeholder="Ex: +1 (000)-000-0000" class="form-input" type="tel" name="phone" required="true" />
        <label>Your Industry</label>
        <div class="divider"></div>
        <hr />
        <div class="divider"></div>
        <input placeholder="Ex: Landscaping" class="form-input" type="text" name="industry" required="true" />
        <label>Email</label>
        <div class="divider"></div>
        <hr />
        <div class="divider"></div>
        <input placeholder="Username@Website.Ext" class="form-input" type="email" name="email" required="true" />
        <label>Message</label>
        <div class="divider"></div>
        <hr />
        <div class="divider"></div>
        <textarea placeholder="Hello, I am interested in discussing Houston Business Group to join alongside its mission." class="form-input" maxlength="960" minlength="0" name="message" required="true"></textarea>
        <label>
         Join mailing list?
         <input value="true" type="checkbox" name="enroll" checked="true" />
         <div class="divider"></div>
         <hr />
         <div class="divider"></div>
        </label>
        <div class="h-captcha" data-sitekey="884a606e-fd98-4c56-a6ca-f7004ddcbe5a" data-theme="dark" data-size="compact"></div>
        <button class="pure-button pure-button-primary">SUBMIT</button>
